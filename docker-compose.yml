services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports: # Add this section to map the container port to the host port
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker:9092,CONTROLLER://broker:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_ADVERTISED_HOST_NAME: broker
    networks:
      - my_rasp_network
    restart: unless-stopped

  common_infra:
    image: richie31/common-infra-python-library
    container_name: common_infra
    env_file:
      - /home/richie/private-secrets/common_infra/.env
    ports:
      - "5003:5003"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    volumes:
      - mysql_ubuntu_rasp_device:/dumps
    networks:
      - my_rasp_network
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    networks:
      - my_rasp_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - /home/richie/private-secrets/common_infra/.env
    volumes:
      - mysql_ubuntu_rasp_device:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - my_rasp_network

networks:
  my_rasp_network:
    external: true

volumes:
  mysql_ubuntu_rasp_device:
    external: true